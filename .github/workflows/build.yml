name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pyinstaller_name: bizsync-backend
            artifact_name: BizSync-macOS-arm64
            bundle_glob: src-tauri/target/release/bundle/dmg/*.dmg

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pyinstaller_name: bizsync-backend.exe
            artifact_name: BizSync-Windows-x64
            bundle_glob: src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt pyinstaller

      - name: Prepare .env (placeholder for CI)
        run: cp .env.example .env

      - name: Build backend with PyInstaller
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          else
            SEP=":"
          fi
          pyinstaller --onefile \
            --distpath dist-python \
            --name ${{ matrix.pyinstaller_name }} \
            --add-data "backend${SEP}backend" \
            --add-data "utils${SEP}utils" \
            --add-data "config.py${SEP}." \
            --add-data "main_prompts.py${SEP}." \
            --add-data "create_logger.py${SEP}." \
            --hidden-import=uvicorn \
            --hidden-import=uvicorn.loops.auto \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=fastapi \
            --hidden-import=mysql.connector \
            --hidden-import=langgraph \
            --hidden-import=langchain_openai \
            --hidden-import=langchain_core \
            --hidden-import=bcrypt \
            --hidden-import=pydantic \
            --hidden-import=pydantic.deprecated.decorator \
            --hidden-import=aiofiles \
            --hidden-import=python_multipart \
            --hidden-import=jose \
            --hidden-import=dotenv \
            --hidden-import=pytz \
            --hidden-import=schedule \
            --hidden-import=jinja2 \
            --hidden-import=websockets \
            --hidden-import=docx \
            --hidden-import=PyPDF2 \
            --hidden-import=pdfplumber \
            --hidden-import=openai \
            --collect-submodules=uvicorn \
            --collect-submodules=fastapi \
            backend/entry.py
        shell: bash

      - name: Copy PyInstaller output to project root
        run: cp dist-python/${{ matrix.pyinstaller_name }} .
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BUNDLES="nsis"
          else
            BUNDLES="dmg"
          fi
          cargo tauri build --bundles "$BUNDLES"
        working-directory: src-tauri
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
