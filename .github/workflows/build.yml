name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt pyinstaller

      - name: Prepare .env (placeholder for CI)
        run: cp .env.example .env

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile \
            --distpath dist-python \
            --name bizsync-backend \
            --add-data "backend:backend" \
            --add-data "utils:utils" \
            --add-data "config.py:." \
            --add-data "main_prompts.py:." \
            --add-data "create_logger.py:." \
            --hidden-import=uvicorn \
            --hidden-import=uvicorn.loops.auto \
            --hidden-import=uvicorn.protocols.http.auto \
            --hidden-import=fastapi \
            --hidden-import=mysql.connector \
            --hidden-import=langgraph \
            --hidden-import=langchain_openai \
            --hidden-import=langchain_core \
            --hidden-import=bcrypt \
            --hidden-import=pydantic \
            --hidden-import=pydantic.deprecated.decorator \
            --hidden-import=aiofiles \
            --hidden-import=python_multipart \
            --hidden-import=jose \
            --hidden-import=dotenv \
            --hidden-import=pytz \
            --hidden-import=schedule \
            --hidden-import=jinja2 \
            --hidden-import=websockets \
            --hidden-import=docx \
            --hidden-import=PyPDF2 \
            --hidden-import=pdfplumber \
            --hidden-import=openai \
            --collect-submodules=uvicorn \
            --collect-submodules=fastapi \
            backend/entry.py

      - name: Copy PyInstaller output to project root
        run: cp dist-python/bizsync-backend .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npx tauri build --bundles dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BizSync-macOS-arm64
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.txt pyinstaller

      - name: Prepare .env (placeholder for CI)
        run: cp .env.example .env

      - name: Build backend with PyInstaller
        run: |
          pyinstaller --onefile `
            --distpath dist-python `
            --name bizsync-backend.exe `
            --add-data "backend;backend" `
            --add-data "utils;utils" `
            --add-data "config.py;." `
            --add-data "main_prompts.py;." `
            --add-data "create_logger.py;." `
            --hidden-import=uvicorn `
            --hidden-import=uvicorn.loops.auto `
            --hidden-import=uvicorn.protocols.http.auto `
            --hidden-import=fastapi `
            --hidden-import=mysql.connector `
            --hidden-import=langgraph `
            --hidden-import=langchain_openai `
            --hidden-import=langchain_core `
            --hidden-import=bcrypt `
            --hidden-import=pydantic `
            --hidden-import=pydantic.deprecated.decorator `
            --hidden-import=aiofiles `
            --hidden-import=python_multipart `
            --hidden-import=jose `
            --hidden-import=dotenv `
            --hidden-import=pytz `
            --hidden-import=schedule `
            --hidden-import=jinja2 `
            --hidden-import=websockets `
            --hidden-import=docx `
            --hidden-import=PyPDF2 `
            --hidden-import=pdfplumber `
            --hidden-import=openai `
            --collect-submodules=uvicorn `
            --collect-submodules=fastapi `
            backend/entry.py

      - name: Copy PyInstaller output to project root
        run: cp dist-python/bizsync-backend.exe bizsync-backend
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: npx tauri build --bundles nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BizSync-Windows-x64
          path: src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
